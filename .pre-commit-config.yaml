# Pre-commit hooks для автоматической проверки качества кода
# Установка: pip install pre-commit
# Активация: pre-commit install
# Запуск вручную: pre-commit run --all-files

repos:
  # Общие хуки для всех типов файлов
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace        # Удаление пробелов в конце строк
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer          # Добавление пустой строки в конец файла
      - id: check-yaml                 # Проверка синтаксиса YAML
        args: [--unsafe]               # Разрешить custom tags в docker-compose.yml
      - id: check-json                 # Проверка синтаксиса JSON
      - id: check-toml                 # Проверка синтаксиса TOML
      - id: check-added-large-files    # Блокировка больших файлов (>500KB)
        args: [--maxkb=500]
      - id: check-merge-conflict       # Проверка на незакрытые merge conflicts
      - id: check-case-conflict        # Проверка на конфликты имен файлов
      - id: mixed-line-ending          # Проверка смешанных окончаний строк
        args: [--fix=lf]               # Нормализация к LF
      - id: detect-private-key         # Обнаружение приватных ключей

  # Black - форматирование кода Python
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3.12
        args: [--line-length=100, --target-version=py312]

  # Ruff - быстрый линтер для Python (замена flake8, isort, и др.)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]  # Автоисправление + выход с ошибкой
      - id: ruff-format                         # Форматирование (альтернатива black)

  # MyPy - проверка типов
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --check-untyped-defs]
        additional_dependencies:
          - types-requests
          - types-redis
          - types-passlib
          - pydantic
        # Ограничиваем проверку только на типизированные вспомогательные модули
        files: '^app/utils/.*\.py$'

  # Bandit - проверка безопасности кода
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.0
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]

  # Проверка Markdown файлов
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.44.0
    hooks:
      - id: markdownlint
        args: [--fix, --disable, MD013, MD033, MD034, MD036, MD040, MD029, MD024, MD051]
        # MD013: Длина строки
        # MD033: Inline HTML
        # MD034: Bare URLs
        # MD036: Emphasis as heading
        # MD040: Fenced code language
        # MD029: Ordered list prefix
        # MD024: Duplicate headings (допустимо в CHANGELOG)
        # MD051: Link fragments (проблемы с кириллицей)

  # Проверка requirements.txt
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.5
    hooks:
      - id: remove-tabs
        exclude: ^(Makefile|\.git/)
